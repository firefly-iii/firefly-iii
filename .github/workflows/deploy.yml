name: Build & Deploy

on:
  push:
    branches: [ develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # ---------- PHP ----------
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5
          extensions: mbstring, intl, pdo_mysql, bcmath, curl, zip, xml

      # 🔥 обязательно для Firefly (иначе composer падает)
      - name: Prepare Laravel env
        run: |
          cp .env.example .env
          sed -i 's|APP_KEY=.*|APP_KEY=base64:AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=|' .env

      - name: Install Composer deps
        run: composer install --no-dev --optimize-autoloader
      # ---------- NODE ----------
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install root npm deps
        run: npm ci --include=dev

      # v2 (Vite)
      - name: Build v2
        run: |
          cd resources/assets/v2
          npm ci --include=dev
          npm run build

      # v1 (Mix)
      - name: Build v1
        run: |
          cd resources/assets/v1
          npm ci --include=dev
          npm run production

      # ---------- ARTIFACT ----------
      - name: Upload build
        uses: actions/upload-artifact@v4
        with:
          name: app-build
          path: |
            app
            bootstrap
            config
            database
            public
            resources
            routes
            vendor
            artisan
            composer.json
            composer.lock

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: app-build
          path: /tmp/build

      - name: Deploy to server
        run: |
          set -e

          TARGET=/var/www/firefly-iii

          mkdir -p $TARGET

          # безопасный деплой (не удаляет .env)
          rsync -a --delete --exclude=".env" /tmp/build/ $TARGET/

          cd $TARGET

          # если первый запуск
          if [ ! -f .env ]; then
            cp .env.example .env
            php artisan key:generate
          fi

          # storage (важно для Laravel)
          mkdir -p storage/framework/cache
          mkdir -p storage/framework/sessions
          mkdir -p storage/framework/views
          mkdir -p storage/logs

          php artisan migrate --force
          php artisan optimize:clear

          chown -R www-data:www-data storage bootstrap/cache
